apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  labels:
    app: userservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      containers:
      - name: userservice
        image: userservice:latest
        ports:
        - containerPort: 8081
        env:
        - name: CONFIGSERVER_URI
          value: "http://configserver:8888"
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: EUREKA_SERVER_URI
          value: "http://eurekaserver:8761/eureka/"
