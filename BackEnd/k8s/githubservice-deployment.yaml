apiVersion: apps/v1
kind: Deployment
metadata:
  name: githubservice
  labels:
    app: githubservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: githubservice
  template:
    metadata:
      labels:
        app: githubservice
    spec:
      containers:
      - name: githubservice
        image: githubservice:latest
        ports:
        - containerPort: 8083
        env:
        - name: CONFIGSERVER_URI
          value: "http://configserver:8888"
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: EUREKA_SERVER_URI
          value: "http://eurekaserver:8761/eureka/"
