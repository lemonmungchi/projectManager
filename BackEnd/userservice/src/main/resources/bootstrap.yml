server:
  port: 8081

spring:
  application:
    name: userservice
  cloud:
    config:
      uri: http://localhost:8888 # Config Server URL
      fail-fast: true
  datasource:
    url: jdbc:mysql://localhost:3306/userservice
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update # 개발 중에는 update, 운영 중에는 validate
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
