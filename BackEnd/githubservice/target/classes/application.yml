spring:
  application:
    name: githubservice
  cloud:
    config:
      uri: ${CONFIGSERVER_URI:http://localhost:8888}
      fail-fast: true

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
